      const loadScript = (src) =>

          const script = document.createElement('script');
          script.async = true;
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });

      const loadTrackers = () => {
        window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
        loadScript('https://www.googletagmanager.com/gtm.js?id=GTM-PXRN7NQR').catch(() => {});

          n.push = n;
          n.loaded = !0;
          n.version = '2.0';
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

        if (window.fbq) {
          window.fbq('init', '803178395788966');
          window.fbq('track', 'PageView');
        }
      };

      const scheduleTrackers = () => {
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadTrackers, { timeout: 3000 });
          return;
        }
        setTimeout(loadTrackers, 3000);
      };

      if (document.readyState === 'complete') {
        scheduleTrackers();
      } else {
        window.addEventListener('load', scheduleTrackers, { once: true });
      }
    </script>
